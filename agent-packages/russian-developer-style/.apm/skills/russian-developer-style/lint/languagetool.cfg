# LanguageTool — стартовая конфигурация для русской developer-документации.
#
# Файл задаёт правила для CLI и серверного режима LanguageTool. Используйте
# с профилем `ru-RU`. Точное имя ключей и формат разделителя зависят от
# версии LanguageTool — сверяйтесь с upstream-доками вашей версии.
#
# Принципы:
#   - подавляем только правила, дающие шум на коде и технических терминах;
#   - не глушим грамматику и согласования;
#   - не глушим повторы слов в соседних предложениях (это полезный сигнал).
#
# Чтобы прогнать LanguageTool локально:
#   languagetool --config languagetool.cfg --language ru-RU file.md
# или через docker-образ erikvl87/languagetool, передав файл по HTTP.

language=ru-RU

# Использовать английские термины внутри русского текста — норма для
# developer-доков. Правило WHITESPACE_RULE не глушим — оно ловит реальные
# опечатки, но снимаем чувствительность к двойным пробелам после точки в
# Markdown-таблицах.
disabledRules=WHITESPACE_RULE

# Категории, шумные на коде в прозе. Снимайте только если выяснили, что
# проект действительно живёт с этим шумом, иначе оставляйте включёнными.
# disabledCategories=TYPOS,STYLE

# Минимальный уровень серьёзности срабатывания. Поднимайте до 'error',
# если в CI хотите ловить только критические находки.
# level=picky

# Файл словаря с продуктовыми и техническими терминами. Положите слова
# по одному в строку. Не дублирует yaspeller — LanguageTool использует
# отдельный список.
# dictionary=./languagetool-dictionary.txt

# Чтобы не ругаться на blockcode и inline-code, рекомендуем заранее
# вырезать их из текста (плагин language-tool-pre-commit умеет это).
# Иначе подавьте конкретные правила здесь, когда найдёте источник шума.
