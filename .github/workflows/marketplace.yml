name: Validate marketplace

on:
  pull_request:
    paths:
      - apm.yml
      - .claude-plugin/marketplace.json
      - agent-packages/**
  push:
    branches: [main]
    paths:
      - apm.yml
      - .claude-plugin/marketplace.json
      - agent-packages/**

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "apm-cli>=0.16"
      # --check-versions: every package declares a version consistent with the strategy.
      # --check-clean: the committed marketplace.json matches what apm.yml would produce.
      # --dry-run is required: without it, pack rewrites the file first and the drift check always passes.
      - name: Check versions aligned and index in sync
        run: apm pack --check-versions --check-clean --dry-run
